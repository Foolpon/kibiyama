<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&display=swap');
:root {
  --primary: #F5A623;
  --light: #FFD080;
  --bg: #0D1E3A;
  --surface: #1B2A4A;
  --border: #2A3D60;
  --text: #F5A623;
  --text2: #FFD080;
  --text3: #8A9DBD;
  --green: #5aaa70;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: 'PingFang TC','Apple SD Gothic Neo','Microsoft JhengHei',sans-serif; font-weight:600; background: var(--bg); color: var(--text); min-height: 100vh; }

/* Header */
.order-header {
  padding: 16px 14px 12px; text-align: center;
  border-bottom: 1px solid var(--border);
  background: var(--bg); position: sticky; top: 0; z-index: 100;
}
.store-name { font-size: 22px; font-weight: 800; letter-spacing: 0.05em; margin-bottom: 3px; color: var(--light); }
.store-sub { font-size: 12px; color: var(--text3); }

/* 客人列 */
.customer-top-row {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 14px; border-bottom: 1px solid var(--border);
  background: var(--bg);
}
.dt-label { font-size: 11px; color: var(--text3); white-space: nowrap; }
.dt-input {
  flex: 1; background: var(--surface); border: 1px solid var(--border);
  border-radius: 6px; padding: 6px 10px; color: var(--text);
  font-family: 'PingFang TC',sans-serif; font-size: 12px; outline: none;
}
.dt-input:focus { border-color: var(--primary); }
.new-client-toggle { display: flex; align-items: center; gap: 6px; padding: 0 4px; cursor: pointer; flex-shrink: 0; }
.new-client-check {
  width: 20px; height: 20px; border-radius: 4px;
  border: 2px solid var(--primary); background: transparent;
  display: flex; align-items: center; justify-content: center; transition: all 0.15s;
}
.new-client-check.checked { background: var(--primary); }
.new-client-check.checked::after { content: '✓'; color: var(--bg); font-size: 12px; font-weight: 700; }
.new-client-label { font-size: 12px; color: var(--primary); font-weight: 700; white-space: nowrap; }

/* 日期時間 */
.datetime-row {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 14px; border-bottom: 1px solid var(--border); background: var(--bg);
}

/* 頁籤 */
.tab-row {
  display: flex; border-bottom: 1px solid var(--border);
  background: var(--bg); position: sticky; top: 0; z-index: 10;
}
.tab-btn {
  flex: 1; padding: 10px 4px; text-align: center;
  font-size: 12px; color: var(--text3); cursor: pointer;
  border-bottom: 2px solid transparent; transition: all 0.15s;
}
.tab-btn.active { color: var(--primary); border-bottom-color: var(--primary); }

/* 商品格 */
.items-grid-2 { display: grid; grid-template-columns: repeat(2,1fr); gap: 1px; background: var(--border); }
.items-grid-1 { display: grid; grid-template-columns: 1fr; gap: 1px; background: var(--border); }
.items-grid-3 { display: grid; grid-template-columns: repeat(3,1fr); gap: 1px; background: var(--border); }
.cat-label {
  grid-column: 1/-1; padding: 8px 12px; font-size: 10px; font-weight: 700;
  letter-spacing: 0.12em; text-transform: uppercase;
  background: var(--bg); color: var(--text3); border-top: 1px solid var(--border);
}
.item-card {
  background: #1B2A4A; padding: clamp(10px,2.5vw,18px) clamp(8px,2vw,14px);
  cursor: pointer; position: relative; transition: background 0.1s; user-select: none;
  display: flex; flex-direction: row; align-items: center; justify-content: space-between;
  border: 1px solid #2A3D60; min-height: clamp(56px,10vw,80px); gap: 8px;
}
.item-card:active { transform: scale(0.96); background: #2A3D60; }
.item-name { font-size: clamp(15px,3.5vw,26px); line-height: 1.3; color: #FFD080; font-weight: 700; flex: 1; }
.item-price { font-size: clamp(15px,3.5vw,26px); font-weight: 700; color: var(--primary); flex-shrink: 0; text-align: right; }
.qty-badge {
  position: absolute; top: 4px; right: 4px;
  width: clamp(18px,4vw,26px); height: clamp(18px,4vw,26px);
  border-radius: 50%; font-size: clamp(10px,2.5vw,13px); font-weight: 700;
  display: none; align-items: center; justify-content: center;
  color: #1B2A4A; background: var(--primary);
}
.item-card.hq .qty-badge { display: flex; }

/* 備註 */
.note-row {
  padding: 9px 14px; display: flex; gap: 8px; align-items: center;
  border-top: 1px solid var(--border); background: var(--bg);
}
.note-input {
  flex: 1; background: var(--surface); border: 1px solid var(--border);
  border-radius: 6px; padding: 6px 10px; color: var(--text);
  font-family: 'PingFang TC',sans-serif; font-size: 12px; outline: none;
}
.note-input:focus { border-color: var(--primary); }

/* 購物車 */
.cart-wrap { padding: 8px 14px; }
.cart-lbl { font-size: 10px; color: var(--text3); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 5px; }
.cart-item {
  display: flex; align-items: center; gap: 7px;
  padding: 7px 10px; background: var(--surface); border-radius: 6px; margin-bottom: 3px;
}
.ci-name { flex: 1; font-size: 13px; color: var(--text2); }
.qc { display: flex; align-items: center; gap: 4px; }
.qb {
  width: 26px; height: 26px; border-radius: 4px;
  border: 1px solid var(--border); background: var(--bg);
  color: var(--text2); font-size: 15px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}
.qb:active { background: var(--primary); color: var(--bg); }
.qn { font-size: 13px; min-width: 20px; text-align: center; color: var(--text); }
.ci-sub { font-size: 12px; min-width: 44px; text-align: right; color: var(--primary); font-weight: 700; }
.total-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 10px 14px; margin: 3px 0;
}
.total-lbl { font-size: 14px; color: var(--text2); }
.total-amt { font-size: 24px; font-weight: 800; color: var(--light); }
.submit-btn {
  margin: 4px 14px 20px; width: calc(100% - 28px);
  padding: 16px; border: none; border-radius: 10px;
  font-family: 'PingFang TC',sans-serif; font-size: 16px; font-weight: 800;
  cursor: pointer; letter-spacing: 0.08em; transition: all 0.15s;
  background: var(--primary); color: var(--bg);
}
.submit-btn:disabled { background: var(--border); color: var(--text3); cursor: not-allowed; }
.submit-btn:active { opacity: 0.85; }

/* 成功畫面 */
.success-screen {
  display: none; position: fixed; inset: 0;
  background: rgba(8,8,8,0.96); z-index: 2000;

  gap: 14px; text-align: center;
}
.success-screen.show { display: flex; }
.s-icon { font-size: 64px; }
.s-msg { font-size: 24px; font-weight: 800; color: var(--light); }
.s-sub { font-size: 14px; color: var(--text3); }
.s-back {
  margin-top: 12px; padding: 13px 32px; border-radius: 10px;
  border: none; font-family: 'PingFang TC',sans-serif; font-size: 15px; font-weight: 800;
  cursor: pointer; background: var(--primary); color: var(--bg);
}

/* 自動完成 */
.autocomplete-wrap { position: relative; flex: 1; }
.autocomplete-dropdown {
  position: absolute; top: 100%; left: 0; right: 0; z-index: 500;

.autocomplete-item {

}
.autocomplete-item:hover, .autocomplete-item.active { background: #2a2820; }
.ac-name { font-size: 13px; color: #f0ece0; }
.ac-sub { font-size: 10px; color: #6a6058; margin-top: 2px; }

/* Toast */
.toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);

  opacity: 0; transition: opacity 0.25s; z-index: 9999; white-space: nowrap; pointer-events: none;
}
.toast.show { opacity: 1; }
</style>

const muriMenu

let cart = {};
let isNew = false;
let acIdx = -1;

// 初始化
function init() {
  buildGrid();
  setDefaultDatetime();
}

function buildGrid() {
  const container = document.getElementById(PREFIX+'-grid');
  const g0 = document.createElement('div'); g0.className='items-grid-2'; g0.id='g0';
  const g1 = document.createElement('div'); g1.className='items-grid-1'; g1.id='g1'; g1.style.display='none';
  const g2 = document.createElement('div'); g2.className='items-grid-3'; g2.id='g2'; g2.style.display='none';
  let lastGroup = '';
  muriMenu.forEach((item,idx)=>{
    const card = document.createElement('div');
    card.className='item-card'; card.id='item_'+idx;
    card.innerHTML=`<div class="qty-badge" id="badge_${idx}"></div><div class="item-name">${item.n}</div><div class="item-price">$${item.p}</div>`;
    card.onclick=()=>addItem(idx);
    if(item.c===0) g0.appendChild(card);
    else if(item.c===1) g1.appendChild(card);
    else {
      if(item.g && item.g!==lastGroup) {
        const lbl=document.createElement('div'); lbl.className='cat-label'; lbl.textContent=item.g;
        g2.appendChild(lbl); lastGroup=item.g;
      }
      g2.appendChild(card);
    }
  });
  container.appendChild(g0); container.appendChild(g1); container.appendChild(g2);
}

function switchTab(tab) {
  document.getElementById(PREFIX+'-tabrow').querySelectorAll('.tab-btn')
    .forEach((b,i)=>b.classList.toggle('active',i===tab));
  [0,1,2].forEach(i=>{ const g=document.getElementById('g'+i); if(g) g.style.display=i===tab?'':'none'; });
}

function addItem(idx) { cart[idx]=(cart[idx]||0)+1; renderCart(); }
function chgQty(idx,d) { cart[idx]=(cart[idx]||0)+d; if(cart[idx]<=0) delete cart[idx]; renderCart(); }

function renderCart() {
  const menu = muriMenu;
  const keys = Object.keys(cart);
  menu.forEach((_,idx)=>{
    const el=document.getElementById('item_'+idx);
    const b=document.getElementById('badge_'+idx);
    if(!el) return;
    const q=cart[idx]||0;
    el.classList.toggle('hq',q>0);
    if(b) b.textContent=q||'';
  });
  const wrap=document.getElementById(PREFIX+'-cart-wrap');
  const sub=document.getElementById(PREFIX+'-sub');
  if(!keys.length){ wrap.style.display='none'; sub.disabled=true; sub.textContent='請選擇品項'; return; }
  wrap.style.display='block';
  let total=0, html='';
  keys.forEach(idx=>{
    const item=menu[idx]; const q=cart[idx]; const s=item.p*q; total+=s;
    html+=`<div class="cart-item"><div class="ci-name">${item.n}</div>
      <div class="qc"><button class="qb" onclick="chgQty(${idx},-1)">−</button>
      <span class="qn">${q}</span>
      <button class="qb" onclick="chgQty(${idx},1)">＋</button></div>
      <div class="ci-sub">$${s}</div></div>`;
  });
  document.getElementById(PREFIX+'-cart-list').innerHTML=html;
  document.getElementById(PREFIX+'-total').textContent='$'+total;
  sub.disabled=false; sub.textContent=`送出訂單 $${total}`;
}

async function submitOrder() {
  const menu = muriMenu;
  const keys = Object.keys(cart);
  if(!keys.length) return;
  const customer=document.getElementById(PREFIX+'-customer').value.trim();
  const note=document.getElementById(PREFIX+'-note').value.trim();
  const dtInput=document.getElementById(PREFIX+'-datetime').value;
  const orderTime=dtInput?new Date(dtInput).toLocaleString('zh-TW',{year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'}):new Date().toLocaleString('zh-TW',{year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'});
  const items=keys.map(i=>`${menu[i].n}×${cart[i]}`).join('、');
  const total=keys.reduce((s,i)=>s+menu[i].p*cart[i],0);
  const btn=document.getElementById(PREFIX+'-sub');
  btn.disabled=true; btn.textContent='送出中…';
  try {
    await fetch(GAS,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({type:'order',store:STORE,items,total,note,customer,orderTime,isNew})});
    document.getElementById(PREFIX+'-ok').classList.add('show');
  } catch(e){ toast('連線失敗，請重試'); btn.disabled=false; btn.textContent=`送出訂單 $${total}`; }
}

function resetOrder() {
  cart={};
  isNew=false;
  document.getElementById(PREFIX+'-note').value='';
  document.getElementById(PREFIX+'-customer').value='';
  document.getElementById(PREFIX+'-new-check').classList.remove('checked');
  document.getElementById(PREFIX+'-ok').classList.remove('show');
  setDefaultDatetime();
  renderCart();
}

function toggleNewClient() {
  isNew=!isNew;
  document.getElementById(PREFIX+'-new-check').classList.toggle('checked',isNew);
}

function setDefaultDatetime() {
  const now=new Date();
  const pad=n=>String(n).padStart(2,'0');
  document.getElementById(PREFIX+'-datetime').value=now.getFullYear()+'-'+pad(now.getMonth()+1)+'-'+pad(now.getDate())+'T'+pad(now.getHours())+':'+pad(now.getMinutes());
}

// 自動完成
function acInput() {
  const val=document.getElementById(PREFIX+'-customer').value.trim();
  const drop=document.getElementById(PREFIX+'-ac-drop');
  acIdx=-1;
  if(!val){ drop.style.display='none'; return; }
  const matches=CUSTOMERS.filter(c=>c.name.toLowerCase().includes(val.toLowerCase())).slice(0,6);
  if(!matches.length){ drop.style.display='none'; return; }
  drop.innerHTML=matches.map((c,i)=>`
    <div class="autocomplete-item" onmousedown="event.preventDefault();acSelect(${JSON.stringify(c).replace(/'/g,'\\x27')})"
      onmouseover="acIdx=${i}">
      <div class="ac-name">${c.name}</div>
      <div class="ac-sub">${c.phone||''}${c.phone&&c.delivery?' · ':''}${c.delivery||''}</div>
    </div>`).join('');
  drop._matches=matches;
  drop.style.display='block';
}
function acKey(e) {
  const drop=document.getElementById(PREFIX+'-ac-drop');
  if(drop.style.display==='none') return;
  const m=drop._matches||[];
  if(e.key==='ArrowDown'){ e.preventDefault(); acIdx=Math.min(acIdx+1,m.length-1); }
  else if(e.key==='ArrowUp'){ e.preventDefault(); acIdx=Math.max(acIdx-1,0); }
  else if(e.key==='Enter'&&acIdx>=0){ e.preventDefault(); acSelect(m[acIdx]); }
  else if(e.key==='Escape'){ drop.style.display='none'; }
  drop.querySelectorAll('.autocomplete-item').forEach((el,i)=>el.classList.toggle('active',i===acIdx));
}
function acSelect(c) {
  if(typeof c==='string') c=JSON.parse(c);
  document.getElementById(PREFIX+'-customer').value=c.name;
  document.getElementById(PREFIX+'-ac-drop').style.display='none';
  toast('✓ '+c.name);
}
function acBlur() { setTimeout(()=>{ const d=document.getElementById(PREFIX+'-ac-drop'); if(d) d.style.display='none'; },200); }

function toast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2000);
}

init();
</script>
