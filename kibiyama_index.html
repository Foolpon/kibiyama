<style>
:root {
  --primary: #F5A623; --light: #FFD080;
  --bg: #0D1E3A; --surface: #1B2A4A; --border: #2A3D60;
  --text: #F5A623; --text2: #FFD080; --text3: #8A9DBD;
  --green: #5aaa70; --red: #cc5544;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: 'PingFang TC','Apple SD Gothic Neo','Microsoft JhengHei',sans-serif; font-weight:600; background:var(--bg); color:var(--text); min-height:100vh; }

/* Nav */
.main-nav {
  position:fixed; top:0; left:0; right:0; height:48px;
  background:rgba(13,30,58,0.97); border-bottom:1px solid var(--border);
  backdrop-filter:blur(10px); z-index:1000;
  display:flex; align-items:stretch;
}
.nav-logo { padding:0 12px; display:flex; align-items:center; font-size:13px; color:var(--text2); border-right:1px solid var(--border); white-space:nowrap; }
.nav-tabs { display:flex; flex:1; overflow-x:auto; scrollbar-width:none; }
.nav-tabs::-webkit-scrollbar { display:none; }
.nav-tab {
  flex-shrink:0; padding:0 11px; display:flex; align-items:center; gap:5px;
  font-size:11px; color:var(--text3); cursor:pointer;
  border-bottom:2px solid transparent; transition:all 0.2s; white-space:nowrap;
}
.nav-tab.am { color:var(--primary); border-bottom-color:var(--primary); }
.nav-tab.aa { color:#88ccaa; border-bottom-color:#88ccaa; }
.nav-tab.ap { color:#a080c8; border-bottom-color:#a080c8; }
.nav-tab.ac { color:var(--primary); border-bottom-color:var(--primary); }
.nav-tab.as { color:var(--text2); border-bottom-color:var(--text2); }
.nav-tab.ar { color:var(--text2); border-bottom-color:var(--text2); }
.dot { width:6px; height:6px; border-radius:50%; display:inline-block; }
.dm { background:var(--primary); }
.da { background:#88ccaa; }
.dp { background:#a080c8; }
.dc { background:var(--primary); }
.ds { background:var(--text2); }
.dr { background:var(--text2); }

/* Pages */
.page { display:none; padding-top:48px; min-height:100vh; }
.page.active { display:block; }

/* Item cards */
.items-grid-2 { display:grid; grid-template-columns:repeat(2,1fr); gap:1px; background:var(--border); }
.items-grid-1 { display:grid; grid-template-columns:1fr; gap:1px; background:var(--border); }
.items-grid-3 { display:grid; grid-template-columns:repeat(3,1fr); gap:1px; background:var(--border); }
.cat-label {
  grid-column:1/-1; padding:7px 12px; font-size:10px; font-weight:700;
  letter-spacing:0.12em; text-transform:uppercase;
  background:var(--bg); color:var(--text3); border-top:1px solid var(--border);
}
.item-card {
  background:var(--surface); padding:clamp(10px,2.5vw,18px) clamp(8px,2vw,14px);
  cursor:pointer; position:relative; transition:background 0.1s; user-select:none;
  display:flex; flex-direction:row; align-items:center; justify-content:space-between;
  border:1px solid var(--border); min-height:clamp(56px,10vw,80px); gap:8px;
}
.item-card:active { transform:scale(0.96); background:#2A3D60; }
.item-name { font-size:clamp(15px,3.5vw,26px); line-height:1.3; color:var(--text2); font-weight:700; flex:1; }
.item-price { font-size:clamp(15px,3.5vw,26px); font-weight:700; color:var(--primary); flex-shrink:0; text-align:right; }
.qty-badge {
  position:absolute; top:4px; right:4px;
  width:clamp(18px,4vw,26px); height:clamp(18px,4vw,26px);
  border-radius:50%; font-size:clamp(10px,2.5vw,13px); font-weight:700;
  display:none; align-items:center; justify-content:center;
  color:var(--bg); background:var(--primary);
}
.item-card.hq .qty-badge { display:flex; }
.items-grid-1 .item-card { min-height:clamp(50px,8vw,70px); }
.items-grid-1 .qty-badge { top:50%; transform:translateY(-50%); right:8px; }

/* Tab row */
.tab-row {
  display:flex; border-bottom:1px solid var(--border);
  background:var(--bg); position:sticky; top:48px; z-index:10;
}
.tab-btn {
  flex:1; padding:10px 4px; text-align:center;
  font-size:12px; color:var(--text3); cursor:pointer;
  border-bottom:2px solid transparent; transition:all 0.15s;
}
.tab-btn.active { color:var(--primary); border-bottom-color:var(--primary); }

/* Customer row */
.customer-row {
  display:flex; align-items:center; gap:8px;
  padding:8px 14px; border-bottom:1px solid var(--border); background:var(--bg);

function init() {
  buildGrid();

function buildGrid() {
  const con = document.getElementById('grid');
  const g0 = mkEl('items-grid-2','g0');
  const g1 = mkEl('items-grid-1','g1',true);
  const g2 = mkEl('items-grid-3','g2',true);
  let lastG = '';
  muriMenu.forEach((item,idx) => {
    const card = document.createElement('div');
    card.className='item-card'; card.id='it'+idx;
    card.innerHTML=`<div class="qty-badge" id="b${idx}"></div><div class="item-name">${item.n}</div><div class="item-price">$${item.p}</div>`;
    card.onclick=()=>addItem(idx);
    if(item.c===0) g0.appendChild(card);
    else if(item.c===1) g1.appendChild(card);
    else {
      if(item.g&&item.g!==lastG){const lbl=document.createElement('div');lbl.className='cat-label';lbl.textContent=item.g;g2.appendChild(lbl);lastG=item.g;}
      g2.appendChild(card);
    }
  });
  con.appendChild(g0); con.appendChild(g1); con.appendChild(g2);
}

function mkEl(cls,id,hidden){const g=document.createElement('div');g.className=cls;g.id=id;if(hidden)g.style.display='none';return g;}

function switchTab(t){
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',i===t));
  ['g0','g1','g2'].forEach((id,i)=>{const g=document.getElementById(id);if(g)g.style.display=i===t?'':'none';});
}

function addItem(idx){cart[idx]=(cart[idx]||0)+1;renderCart();}
function chgQty(idx,d){cart[idx]=(cart[idx]||0)+d;if(cart[idx]<=0)delete cart[idx];renderCart();}

function renderCart(){
  const menu=muriMenu;
  const keys=Object.keys(cart);
  menu.forEach((_,idx)=>{
    const el=document.getElementById('it'+idx);
    const b=document.getElementById('b'+idx);
    if(!el) return;
    el.classList.toggle('hq',(cart[idx]||0)>0);
    if(b) b.textContent=cart[idx]||'';
  });
  const sec=document.getElementById('cart-section');
  const btn=document.getElementById('submit-btn');
  if(!keys.length){sec.style.display='none';btn.disabled=true;btn.textContent='請選擇品項';return;}
  sec.style.display='block';
  let total=0,html='';
  keys.forEach(idx=>{
    const item=menu[idx];const q=cart[idx];const s=item.p*q;total+=s;
    html+=`<div class="cart-item"><div class="ci-name">${item.n}</div>
      <div class="qc"><button class="qb" onclick="chgQty(${idx},-1)">−</button>
      <span class="qn">${q}</span><button class="qb" onclick="chgQty(${idx},1)">＋</button></div>
      <div class="ci-sub">$${s}</div></div>`;
  });
  document.getElementById('cart-list').innerHTML=html;
  document.getElementById('summary-section').innerHTML=`
    <div class="order-summary">
      <div class="summary-row"><span>品項小計</span><span class="sv">$${total}</span></div>
      <div class="summary-row total"><span>合計</span><span class="sv">$${total}</span></div>
    </div>`;
  btn.disabled=false; btn.textContent=`確認送出 $${total}`;
}

async function submitOrder(){
  const menu=muriMenu;
  const keys=Object.keys(cart);
  if(!keys.length) return;
  const customer=document.getElementById('customer-input').value.trim();
  const note=document.getElementById('note-input').value.trim();
  const dtInput=document.getElementById('dt-input').value;
  const orderTime=dtInput?new Date(dtInput).toLocaleString('zh-TW',{year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'}):new Date().toLocaleString('zh-TW',{year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'});
  const items=keys.map(i=>`${menu[i].n}×${cart[i]}`).join('、');
  const total=keys.reduce((s,i)=>s+menu[i].p*cart[i],0);
  const btn=document.getElementById('submit-btn');
  btn.disabled=true; btn.textContent='送出中…';
  try{
    await fetch(GAS,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({type:'order',store:STORE,items,total,note,customer,orderTime,isNew})});
    document.getElementById('success-screen').classList.add('show');
  }catch(e){toast('連線失敗，請重試');btn.disabled=false;btn.textContent=`確認送出 $${total}`;}
}

function resetOrder(){
  cart={};isNew=false;
  document.getElementById('customer-input').value='';
  document.getElementById('note-input').value='';
  document.getElementById('new-check').classList.remove('on');
  document.getElementById('success-screen').classList.remove('show');
  document.getElementById('cart-section').style.display='none';
  document.getElementById('summary-section').innerHTML='';
  document.getElementById('submit-btn').disabled=true;
  document.getElementById('submit-btn').textContent='請選擇品項';
  const menu=muriMenu;
  menu.forEach((_,idx)=>{const el=document.getElementById('it'+idx);if(el)el.classList.remove('hq');});
  setDT();
}

function toggleNew(){isNew=!isNew;document.getElementById('new-check').classList.toggle('on',isNew);}

function setDT(){
  const now=new Date();const pad=n=>String(n).padStart(2,'0');
  document.getElementById('dt-input').value=`${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}T${pad(now.getHours())}:${pad(now.getMinutes())}`;
}

function acInput(){
  const val=document.getElementById('customer-input').value.trim();
  const drop=document.getElementById('ac-drop');
  acIdx=-1;
  if(!val){drop.style.display='none';return;}
  const m=CUSTOMERS.filter(c=>c.name.toLowerCase().includes(val.toLowerCase())).slice(0,6);
  if(!m.length){drop.style.display='none';return;}
  drop.innerHTML=m.map((c,i)=>`
    <div class="ac-item" onmousedown="event.preventDefault();acSel(${JSON.stringify(c).replace(/'/g,'\x27')})" onmouseover="acIdx=${i}">
      <div class="ac-name">${c.name}</div><div class="ac-sub">${c.phone||''}${c.phone&&c.delivery?' · ':''}${c.delivery||''}</div>
    </div>`).join('');
  drop._m=m; drop.style.display='block';
}
function acKey(e){
  const drop=document.getElementById('ac-drop');if(drop.style.display==='none')return;
  const m=drop._m||[];
  if(e.key==='ArrowDown'){e.preventDefault();acIdx=Math.min(acIdx+1,m.length-1);}
  else if(e.key==='ArrowUp'){e.preventDefault();acIdx=Math.max(acIdx-1,0);}
  else if(e.key==='Enter'&&acIdx>=0){e.preventDefault();acSel(m[acIdx]);}
  else if(e.key==='Escape'){drop.style.display='none';}
  drop.querySelectorAll('.ac-item').forEach((el,i)=>el.classList.toggle('on',i===acIdx));
}
function acSel(c){if(typeof c==='string')c=JSON.parse(c);document.getElementById('customer-input').value=c.name;document.getElementById('ac-drop').style.display='none';toast('✓ '+c.name);}
function acBlur(){setTimeout(()=>{const d=document.getElementById('ac-drop');if(d)d.style.display='none';},200);}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000);}
